name: Deploy Backend to HF Spaces

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'   # only runs when backend files change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend/ to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend
          git init
          git config user.email "ci@cognifyai.app"
          git config user.name "CognifyAI CI"
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push https://Ramosh99:${HF_TOKEN}@huggingface.co/spaces/Ramosh99/cognify HEAD:main --force
